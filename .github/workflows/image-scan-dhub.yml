name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: raghuesh/gha-demo-vuln-image
      PROJECT_KEY: ${{ vars.ORCA_SECURITY_PROJECT_KEY }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - uses: docker/build-push-action@v6
      with:
        push: true
        tags: user/app:latest
    
    - name: Build the Docker image
      run: |
        export GITHUB_SHA_SHORT="${GITHUB_SHA:0:8}"
        echo "Check GITHUB_SHA_SHORT=${GITHUB_SHA_SHORT}" 
        echo "GITHUB_SHA_SHORT=${GITHUB_SHA_SHORT}" >> $GITHUB_ENV
        docker build . --file Dockerfile --tag ${IMAGE_NAME}:${GITHUB_SHA_SHORT}
        echo "Images list..."
        docker image ls
        docker push ${IMAGE_NAME}:${GITHUB_SHA_SHORT}

    - name: Run Orca Container Image Scan
      uses: orcasecurity/shiftleft-container-image-action@v1
      with:
        api_token: ${{ secrets.ORCA_SECURITY_API_TOKEN }}
        project_key: ${{ vars.ORCA_SECURITY_PROJECT_KEY }} 
        image: ${IMAGE_NAME}:${GITHUB_SHA_SHORT}
        debug: true
